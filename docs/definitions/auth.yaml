components:
  schemas:
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Логин пользователя (3-50 символов)
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: Пароль (8-128 символов)

    LoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT access token
