components:
  schemas:
    ValidationError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [validation_error]
        message:
          type: string

    NotFoundError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [not_found]
        message:
          type: string

    ConflictError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [conflict]
        message:
          type: string

    InternalError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [internal_error]
        message:
          type: string

    CarNotAvailableError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [car_not_available]
        message:
          type: string
        reason:
          type: string
          enum: [already_rented, maintenance, not_found]
          description: Причина недоступности

    UnauthorizedError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [unauthorized]
        message:
          type: string
          example: Invalid credentials
